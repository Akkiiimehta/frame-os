[build]
  command = "npm run build"
  publish = "dist"
  environment = { NODE_VERSION = "18" }

# Environment variables can be set in Netlify UI (Settings > Build & Deploy > Environment)
# OR in netlify.toml [build.environment] section below:
# [build.environment]
#   VITE_SUPABASE_URL = "your-url"
#   VITE_SUPABASE_ANON_KEY = "your-key"

# SPA fallback: routes all non-file requests to index.html (important for React Router)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Optional: Cache static assets
[[headers]]
  for = "/dist/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
